name: thai_promptpay_flutter_example
description: Example app for thai_promptpay_flutter.
publish_to: none

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  thai_promptpay_flutter:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Used by the smoke tests to assert the rendered QrImageView (the widgets
  # draw QRs with qr_flutter).
  qr_flutter: ^4.1.0
