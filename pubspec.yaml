name: thai_promptpay_flutter
description: >-
  Flutter widgets that render a Thai PromptPay (EMVCo) QR code from a mobile
  number, National ID / Tax ID, e-Wallet or Bill Payment, with an optional
  amount.
version: 0.4.0
repository: https://github.com/ultramcu/thai_promptpay_flutter.dart
homepage: https://github.com/ultramcu/thai_promptpay_flutter.dart
issue_tracker: https://github.com/ultramcu/thai_promptpay_flutter.dart/issues
topics:
  - promptpay
  - thai
  - qr
  - payment
  - flutter

environment:
  # mobile_scanner 7.x requires Flutter >=3.29.0 / Dart >=3.7.0.
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  thai_promptpay: ^0.3.0
  thainum: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
